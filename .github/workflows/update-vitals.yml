name: Update Repo Vitals

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch repos and write repos.json
        env:
          GH_TOKEN: ${{ secrets.VITALS_READ_TOKEN }}
        run: |
          curl -s -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/user/repos?per_page=100&sort=pushed&direction=desc" \
            | python3 -c "
          import json, sys
          repos = json.load(sys.stdin)
          out = []
          for r in repos:
            out.append({
              'name': r['name'],
              'description': r['description'] or '',
              'private': r['private'],
              'language': r['language'] or '—',
              'pushed_at': r['pushed_at'][:10] if r['pushed_at'] else None,
              'url': r['html_url'],
              'homepage': r['homepage'] or None,
            })
          print(json.dumps(out, indent=2))
          " > repos.json

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add repos.json
          git diff --cached --quiet || git commit -m "chore: update repos.json [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
