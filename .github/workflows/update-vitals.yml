name: Update Repo Vitals

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Check interval from config.json
        id: check
        run: |
          INTERVAL=$(python3 -c "import json; print(json.load(open('config.json'))['tracker']['update_interval_hours'])")
          echo "Configured interval: ${INTERVAL}h"

          LAST=$(git log -1 --format="%ct" -- repos.json 2>/dev/null || echo 0)
          NOW=$(date +%s)
          DIFF=$(( (NOW - LAST) / 3600 ))
          echo "Hours since last update: $DIFF"

          if [ "$DIFF" -lt "$INTERVAL" ] && [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Too soon — skipping this run."
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Fetch repos and write repos.json
        if: steps.check.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.VITALS_READ_TOKEN }}
        run: |
          curl -s -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/user/repos?per_page=100&sort=pushed&direction=desc" \
            | python3 -c "
          import json, sys
          repos = json.load(sys.stdin)
          out = []
          for r in repos:
            out.append({
              'name': r['name'],
              'description': r['description'] or '',
              'private': r['private'],
              'language': r['language'] or '—',
              'created_at': r['created_at'][:10] if r['created_at'] else None,
              'pushed_at': r['pushed_at'][:10] if r['pushed_at'] else None,
              'url': r['html_url'],
              'homepage': r['homepage'] or None,
            })
          print(json.dumps(out, indent=2))
          " > repos.json

      - name: Commit if changed
        if: steps.check.outputs.skip == 'false'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add repos.json
          git diff --cached --quiet || git commit -m "chore: update repos.json [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
