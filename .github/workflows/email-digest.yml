name: Daily Stale Project Digest

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      threshold_days:
        description: 'Alert after how many days idle (overrides config.json)'
        required: false
        default: ''
      to_email:
        description: 'Send to this email (overrides config.json)'
        required: false
        default: ''

jobs:
  digest:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Check schedule from config.json
        id: check
        run: |
          python3 << 'EOF'
          import json, sys
          from datetime import datetime, timezone

          with open("config.json") as f:
              cfg = json.load(f)

          ec = cfg["email"]
          target_hour = int(ec.get("digest_hour_utc", 2))
          digest_days = ec.get("digest_days", "daily").lower()

          now = datetime.now(timezone.utc)
          current_hour = now.hour
          current_day  = now.strftime("%A").lower()

          day_map = {
              "daily": True,
              "monday": current_day == "monday",
              "tuesday": current_day == "tuesday",
              "wednesday": current_day == "wednesday",
              "thursday": current_day == "thursday",
              "friday": current_day == "friday",
              "saturday": current_day == "saturday",
              "sunday": current_day == "sunday",
              "weekdays": current_day in ["monday","tuesday","wednesday","thursday","friday"],
              "weekends": current_day in ["saturday","sunday"],
          }

          day_ok  = day_map.get(digest_days, True)
          hour_ok = current_hour == target_hour

          if day_ok and hour_ok:
              print("skip=false")
              with open("/tmp/run_flag", "w") as f: f.write("run")
          else:
              print(f"skip=true (hour={current_hour} target={target_hour} day={current_day} days={digest_days})")
              with open("/tmp/run_flag", "w") as f: f.write("skip")
          EOF

          FLAG=$(cat /tmp/run_flag)
          if [ "$FLAG" = "skip" ] && [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Build and send digest email
        if: steps.check.outputs.skip == 'false'
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          INPUT_THRESHOLD: ${{ inputs.threshold_days }}
          INPUT_EMAIL: ${{ inputs.to_email }}
        run: |
          python3 << 'EOF'
          import json, os, smtplib
          from email.mime.multipart import MIMEMultipart
          from email.mime.text import MIMEText
          from datetime import datetime, timezone

          with open("config.json") as f:
              cfg = json.load(f)

          ec = cfg["email"]
          THRESHOLD_DAYS = int(os.environ.get("INPUT_THRESHOLD") or ec["stale_threshold_days"])
          TO_EMAIL       = os.environ.get("INPUT_EMAIL") or ec["to"]
          EXCLUDE        = set(ec.get("exclude_repos", []))
          TRACKER_URL    = cfg["tracker"]["url"]
          FROM_EMAIL     = "onboarding@resend.dev"

          with open("repos.json") as f:
              repos = json.load(f)

          today = datetime.now(timezone.utc)

          stale = []
          for r in repos:
              if r["name"] in EXCLUDE or not r.get("pushed_at"):
                  continue
              pushed = datetime.fromisoformat(r["pushed_at"].replace("Z", "+00:00") if "T" in r["pushed_at"] else r["pushed_at"] + "T00:00:00+00:00")
              days = (today - pushed).days
              if days >= THRESHOLD_DAYS:
                  stale.append({**r, "days": days})

          stale.sort(key=lambda r: r["days"], reverse=True)

          if not stale:
              print(f"All repos pushed within {THRESHOLD_DAYS} days — no email needed.")
              exit(0)

          def urgency(days):
              if days >= 14: return ("🔴", "#A32D2D", "#FCEBEB")
              if days >= 7:  return ("🟠", "#854F0B", "#FAEEDA")
              return              ("🟡", "#3B6D11", "#EAF3DE")

          rows = ""
          for r in stale:
              icon, color, bg = urgency(r["days"])
              label = f"{r['days']} day{'s' if r['days'] != 1 else ''}"
              desc  = r.get("description") or "no description"
              rows += f"""
              <tr>
                <td style="padding:12px 16px;border-bottom:1px solid #f0f0ec;">
                  <a href="{r['url']}" style="font-weight:600;color:#1a1a18;text-decoration:none;font-size:14px;">{r['name']}</a>
                  <div style="font-size:12px;color:#888;margin-top:2px;">{desc}</div>
                </td>
                <td style="padding:12px 16px;border-bottom:1px solid #f0f0ec;text-align:right;white-space:nowrap;">
                  <span style="background:{bg};color:{color};font-size:12px;font-weight:600;padding:3px 10px;border-radius:99px;">{icon} {label}</span>
                </td>
              </tr>"""

          longest = stale[0]
          nudge = f"<b>{longest['name']}</b> hasn't been touched in <b>{longest['days']} days</b>. Even one commit counts."

          html = f"""<!DOCTYPE html>
          <html><head><meta charset="UTF-8"></head>
          <body style="margin:0;padding:0;background:#f9f9f8;font-family:Inter,system-ui,sans-serif;">
          <div style="max-width:560px;margin:40px auto;background:#fff;border-radius:12px;border:1px solid #e8e8e4;overflow:hidden;">
            <div style="padding:24px 24px 0;">
              <p style="font-size:12px;color:#aaa;margin:0 0 8px;">hotbullet / daily digest · {today.strftime('%A, %d %b %Y')}</p>
              <h1 style="font-size:20px;font-weight:600;color:#1a1a18;margin:0 0 8px;">
                {len(stale)} project{'s' if len(stale) != 1 else ''} waiting for you
              </h1>
              <p style="font-size:14px;color:#666;margin:0 0 20px;line-height:1.6;">{nudge}</p>
            </div>
            <table style="width:100%;border-collapse:collapse;">
              <thead>
                <tr style="background:#f9f9f8;">
                  <th style="padding:8px 16px;text-align:left;font-size:11px;color:#aaa;font-weight:500;border-bottom:1px solid #f0f0ec;">Project</th>
                  <th style="padding:8px 16px;text-align:right;font-size:11px;color:#aaa;font-weight:500;border-bottom:1px solid #f0f0ec;">Last pushed</th>
                </tr>
              </thead>
              <tbody>{rows}</tbody>
            </table>
            <div style="padding:20px 24px;border-top:1px solid #f0f0ec;">
              <p style="font-size:12px;color:#aaa;margin:0 0 4px;">Threshold: {THRESHOLD_DAYS} days · Updates every {cfg['tracker']['update_interval_hours']}h</p>
              <a href="{TRACKER_URL}" style="font-size:13px;font-weight:500;color:#534AB7;text-decoration:none;">Open tracker →</a>
            </div>
          </div>
          </body></html>"""

          subject = f"[tracker] {len(stale)} project{'s' if len(stale) != 1 else ''} idle — longest: {longest['name']} ({longest['days']}d)"
          msg = MIMEMultipart("alternative")
          msg["Subject"] = subject
          msg["From"]    = FROM_EMAIL
          msg["To"]      = TO_EMAIL
          msg.attach(MIMEText(html, "html"))

          try:
              with smtplib.SMTP_SSL("smtp.resend.com", 465) as s:
                  s.login("resend", os.environ["RESEND_API_KEY"])
                  s.sendmail(FROM_EMAIL, TO_EMAIL, msg.as_string())
                  print(f"Email sent to {TO_EMAIL}")
          except Exception as e:
              print(f"Failed: {e}")
              exit(1)
          EOF
